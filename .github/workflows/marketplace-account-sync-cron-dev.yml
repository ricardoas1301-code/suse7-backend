name: Marketplace Account Sync Cron (DEV)

# Contrato DEV (oficial):
#   POST secrets.DEV_MARKETPLACE_SYNC_JOB_URL
#   Header X-Job-Secret: secrets.DEV_JOB_SECRET
#   Body: {"limit":5}
# Vercel DEV: JOB_SECRET ou S7_DEV_JOB_SECRET (mesmo valor do GitHub).
#
# TODO(legacy-secrets): remover fallbacks S7_DEV_* / JOB_SECRET / MARKETPLACE_SYNC_JOB_URL
# após alinhar todos os repos e ambientes ao par DEV_*.

on:
  schedule:
    - cron: "*/1 * * * *"
  workflow_dispatch: {}

jobs:
  run-dev:
    runs-on: ubuntu-latest
    env:
      DEV_MARKETPLACE_SYNC_JOB_URL: ${{ secrets.DEV_MARKETPLACE_SYNC_JOB_URL }}
      DEV_JOB_SECRET: ${{ secrets.DEV_JOB_SECRET }}
      S7_DEV_MARKETPLACE_SYNC_JOB_URL: ${{ secrets.S7_DEV_MARKETPLACE_SYNC_JOB_URL }}
      S7_DEV_JOB_SECRET: ${{ secrets.S7_DEV_JOB_SECRET }}
      MARKETPLACE_SYNC_JOB_URL: ${{ secrets.MARKETPLACE_SYNC_JOB_URL }}
      JOB_SECRET: ${{ secrets.JOB_SECRET }}
    steps:
      - name: Trigger DEV marketplace-account-sync job
        run: |
          set -euo pipefail

          echo "[marketplace-sync-dev] workflow_boot event=schedule_or_dispatch"

          SYNC_JOB_URL="${DEV_MARKETPLACE_SYNC_JOB_URL:-}"
          JOB_SECRET_VALUE="${DEV_JOB_SECRET:-}"
          URL_SOURCE="DEV_MARKETPLACE_SYNC_JOB_URL"
          SECRET_SOURCE="DEV_JOB_SECRET"

          if [ -z "${SYNC_JOB_URL}" ]; then
            SYNC_JOB_URL="${S7_DEV_MARKETPLACE_SYNC_JOB_URL:-}"
            URL_SOURCE="S7_DEV_MARKETPLACE_SYNC_JOB_URL"
          fi
          if [ -z "${SYNC_JOB_URL}" ]; then
            SYNC_JOB_URL="${MARKETPLACE_SYNC_JOB_URL:-}"
            URL_SOURCE="MARKETPLACE_SYNC_JOB_URL"
          fi

          if [ -z "${JOB_SECRET_VALUE}" ]; then
            JOB_SECRET_VALUE="${S7_DEV_JOB_SECRET:-}"
            SECRET_SOURCE="S7_DEV_JOB_SECRET"
          fi
          if [ -z "${JOB_SECRET_VALUE}" ]; then
            JOB_SECRET_VALUE="${JOB_SECRET:-}"
            SECRET_SOURCE="JOB_SECRET"
          fi

          if [ -n "${SYNC_JOB_URL}" ]; then
            echo "[marketplace-sync-dev] url_present=true source=${URL_SOURCE}"
          else
            echo "[marketplace-sync-dev] url_present=false"
          fi

          if [ -n "${JOB_SECRET_VALUE}" ]; then
            echo "[marketplace-sync-dev] secret_present=true source=${SECRET_SOURCE}"
          else
            echo "[marketplace-sync-dev] secret_present=false"
          fi

          if [ -z "${SYNC_JOB_URL}" ] || [ -z "${JOB_SECRET_VALUE}" ]; then
            echo "::error::Missing DEV marketplace sync secrets. Configure DEV_MARKETPLACE_SYNC_JOB_URL + DEV_JOB_SECRET (preferred). Legacy fallbacks: S7_DEV_* or MARKETPLACE_SYNC_JOB_URL + JOB_SECRET."
            exit 1
          fi

          echo "[marketplace-sync-dev] cron_firing method=POST limit=5"
          echo "[marketplace-sync-dev] request_start"

          http_code=$(curl -sS -o /tmp/marketplace-sync-dev.json -w "%{http_code}" -X POST "${SYNC_JOB_URL}" \
            -H "Content-Type: application/json" \
            -H "X-Job-Secret: ${JOB_SECRET_VALUE}" \
            -d '{"limit":5}')

          echo "[marketplace-sync-dev] request_http_status=${http_code}"

          if command -v jq >/dev/null 2>&1; then
            echo "[marketplace-sync-dev] response_summary"
            if ! jq -e . /tmp/marketplace-sync-dev.json >/dev/null 2>&1; then
              echo "(resposta não é JSON válido — primeiros 400 chars)"
              head -c 400 /tmp/marketplace-sync-dev.json || true
              echo
            else
              jq -c \
                '{ok, chunks_processed, chunks_len: (.chunks | length?), incremental_sales_poll: (.incremental_sales_poll | if . == null then {note:"legacy_null"} elif (type == "object") then {attempted, skipped, skip_reason, accounts_attempted, orders_fetched, orders_persisted, errors_len: (.errors | length?)} else . end)}' \
                /tmp/marketplace-sync-dev.json
            fi
          else
            echo "[marketplace-sync-dev] response_body_preview"
            head -c 500 /tmp/marketplace-sync-dev.json || true
            echo
          fi

          if [ "${http_code}" -lt 200 ] || [ "${http_code}" -ge 300 ]; then
            echo "[marketplace-sync-dev] request_failure http_status=${http_code}"
            echo "::error::Falha DEV: HTTP ${http_code} (esperado 2xx)"
            exit 1
          fi

          echo "[marketplace-sync-dev] request_success http_status=${http_code}"
