name: Billing Maintenance Cron (DEV)

# Contrato DEV:
#   POST secrets.DEV_BILLING_PROCESS_PERIOD_EXPIRATIONS_JOB_URL
#   POST secrets.DEV_BILLING_PROCESS_OVERDUES_JOB_URL
#   POST secrets.DEV_BILLING_PROCESS_RENEWALS_JOB_URL (ou /api/jobs/billing-renewal-engine)
#   Header X-Job-Secret: secrets.DEV_JOB_SECRET
#   Body opcional: {"limit":50}

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch: {}

jobs:
  run-dev:
    runs-on: ubuntu-latest
    env:
      PERIOD_JOB_URL: ${{ secrets.DEV_BILLING_PROCESS_PERIOD_EXPIRATIONS_JOB_URL }}
      OVERDUES_JOB_URL: ${{ secrets.DEV_BILLING_PROCESS_OVERDUES_JOB_URL }}
      RENEWALS_JOB_URL: ${{ secrets.DEV_BILLING_PROCESS_RENEWALS_JOB_URL }}
      JOB_SECRET: ${{ secrets.DEV_JOB_SECRET }}
    steps:
      - name: Trigger DEV billing maintenance jobs
        run: |
          set -euo pipefail
          if [ -z "${PERIOD_JOB_URL}" ] || [ -z "${OVERDUES_JOB_URL}" ] || [ -z "${RENEWALS_JOB_URL}" ] || [ -z "${JOB_SECRET}" ]; then
            echo "::error::Missing DEV billing cron secrets (URLs and/or DEV_JOB_SECRET)"
            exit 1
          fi

          for job_name in period-expirations overdues renewals; do
            if [ "${job_name}" = "period-expirations" ]; then
              url="${PERIOD_JOB_URL}"
            elif [ "${job_name}" = "overdues" ]; then
              url="${OVERDUES_JOB_URL}"
            else
              url="${RENEWALS_JOB_URL}"
            fi
            echo "[billing-cron-dev] firing ${job_name}"
            http_code=$(curl -sS -o "/tmp/billing-${job_name}-dev.json" -w "%{http_code}" -X POST "${url}" \
              -H "Content-Type: application/json" \
              -H "X-Job-Secret: ${JOB_SECRET}" \
              -d '{"limit":50}')
            echo "[billing-cron-dev] ${job_name} http_status=${http_code}"
            if [ "${http_code}" -lt 200 ] || [ "${http_code}" -ge 300 ]; then
              echo "::error::Falha DEV ${job_name}: HTTP ${http_code}"
              exit 1
            fi
          done
