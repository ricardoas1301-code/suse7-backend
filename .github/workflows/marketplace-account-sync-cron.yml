name: Marketplace Account Sync Cron

# Contrato de autenticação (PROD):
# - POST secrets.S7_PROD_MARKETPLACE_SYNC_JOB_URL (ex.: https://suse7-backend.vercel.app/api/jobs/marketplace-account-sync)
# - Header: X-Job-Secret: secrets.S7_PROD_JOB_SECRET
# - Body JSON opcional: {"limit":5}
# - Vercel Production: JOB_SECRET ou S7_PROD_JOB_SECRET com o mesmo valor (nunca commitar).
# - Resposta 401: campo reason (missing_job_secret_header | invalid_job_secret | …) sem expor o secret.

on:
  schedule:
    - cron: "*/1 * * * *"
  workflow_dispatch: {}

jobs:
  run-prod:
    runs-on: ubuntu-latest
    env:
      SYNC_JOB_URL: ${{ secrets.S7_PROD_MARKETPLACE_SYNC_JOB_URL }}
      JOB_SECRET: ${{ secrets.S7_PROD_JOB_SECRET }}
    steps:
      - name: Trigger production marketplace-account-sync job
        run: |
          set -euo pipefail
          if [ -z "${SYNC_JOB_URL}" ] || [ -z "${JOB_SECRET}" ]; then
            echo "::error::Missing required GitHub Actions secrets (S7_PROD_MARKETPLACE_SYNC_JOB_URL and/or S7_PROD_JOB_SECRET)"
            exit 1
          fi
          http_code=$(curl -sS -o /tmp/marketplace-sync-prod.json -w "%{http_code}" -X POST "${SYNC_JOB_URL}" \
            -H "Content-Type: application/json" \
            -H "X-Job-Secret: ${JOB_SECRET}" \
            -d '{"limit":5}')
          echo "PROD HTTP status: ${http_code}"
          if command -v jq >/dev/null 2>&1; then
            echo "PROD response summary (sem URL/secret):"
            if ! jq -e . /tmp/marketplace-sync-prod.json >/dev/null 2>&1; then
              echo "(resposta não é JSON válido — primeiros 400 chars)"
              head -c 400 /tmp/marketplace-sync-prod.json || true
              echo
            else
              jq -c \
                '{ok, chunks_processed, chunks_len: (.chunks | length?), incremental_sales_poll: (.incremental_sales_poll | if . == null then {note:"legacy_null"} elif (type == "object") then {attempted, skipped, skip_reason, accounts_attempted, orders_fetched, orders_persisted, errors_len: (.errors | length?)} else . end)}' \
                /tmp/marketplace-sync-prod.json
            fi
          else
            echo "PROD response (primeiros 500 chars):"
            head -c 500 /tmp/marketplace-sync-prod.json || true
            echo
          fi
          if [ "${http_code}" -lt 200 ] || [ "${http_code}" -ge 300 ]; then
            echo "::error::Falha PROD: HTTP ${http_code} (esperado 2xx)"
            exit 1
          fi
